name: Build PATSB Traffic Counter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            libffi-dev \
            libssl-dev \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libsqlite3-dev \
            libpng-dev \
            build-essential \
            ccache

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.33
          pip install buildozer==1.5.0

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk
          yes | ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager \
            --sdk_root=$HOME/.buildozer/android/platform/android-sdk \
            --licenses || true

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      - name: Find APK
        if: always()
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" 2>/dev/null || true
          echo "=== bin/ contents ==="
          ls -la bin/ 2>/dev/null || echo "No bin/ folder"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PATSB-Traffic-Counter
          path: |
            bin/*.apk
            .buildozer/**/*.apk
          retention-days: 30
          if-no-files-found: warn
