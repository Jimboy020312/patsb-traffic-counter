name: Build PATSB Traffic Counter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git zip unzip wget \
            openjdk-17-jdk \
            libffi-dev libssl-dev \
            python3-pip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libsqlite3-dev libpng-dev \
            build-essential ccache

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools
          pip install cython==0.29.33
          pip install buildozer==1.5.0

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      # =========================
      # FIXED ANDROID SDK SETUP
      # =========================
      - name: Install Android cmdline-tools (FIXED)
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip -q tools.zip

          rm -rf latest
          mkdir latest
          mv cmdline-tools/* latest/
          rm -rf cmdline-tools tools.zip

      - name: Install Android SDK packages
        run: |
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --licenses || true

          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      # =========================
      # BUILD
      # =========================
      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      # =========================
      # DEBUG OUTPUT
      # =========================
      - name: Find APK
        if: always()
        run: |
          echo "=== SEARCH APK ==="
          find . -name "*.apk" 2>/dev/null || true
          echo "=== BIN FOLDER ==="
          ls -la bin/ || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PATSB-Traffic-Counter
          path: bin/*.apk
